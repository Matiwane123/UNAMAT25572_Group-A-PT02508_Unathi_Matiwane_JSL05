<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="./styles.css" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/favicon.svg"
    />
    <script defer src="./scripts/main.js" type="module"></script>
    <title>Kanban Task Management</title>
  </head>
  <body>
    <!-- Sidebar -->
    <nav class="side-bar" id="side-bar-div">
      <div id="side-logo-div">
        <img id="logo" src="./assets/logo-light.svg" alt="logo-light" />
      </div>
      <div class="boards-nav-links-div" id="boards-nav-links-div">
        <h4 id="headline-sidepanel">ALL BOARDS (1)</h4>
        <button class="board-btn">Launch Career</button>
      </div>

      <!-- ✅ Sidebar footer with buttons -->
      <div class="sidebar-footer">
        <!-- Dark mode toggle -->
        <button id="toggleTheme" class="theme-toggle-btn">
          🌞Dark Mode 🌚
        </button>

        <!-- Hide/Show sidebar button with emoji eyes -->
        <button id="toggleSidebar" class="sidebar-toggle-btn">
          🚫Hide Sidebar
        </button>
      </div>
    </nav>

    <!-- Layout -->
    <div id="layout">
      <header id="header" class="sticky-header">
        <div class="header-name-div">
          <img
            src="./assets/favicon.svg"
            alt="logo-mobile"
            class="logo-mobile"
          />
          <h2 class="header-board-name" id="header-board-name">
            Launch Career
          </h2>
        </div>

        <!-- ✅ Add Task button -->
        <button id="add-new-task-btn" class="primary-btn">
          + Add New Task
        </button>
      </header>

      <div class="container">
        <main class="card-column-main">
          <!-- TODO Column -->
          <div class="column-div" data-status="todo">
            <div class="column-head-div">
              <span class="dot"></span>
              <h4 class="columnHeader">TODO (0)</h4>
            </div>
            <!-- Tasks container for TODO -->
            <div class="tasks-container">
              <div class="task-div">Launch Epic Career 🚀</div>
              <div class="task-div">Conquer React⚛️</div>
              <div class="task-div">Understand Databases⚙️</div>
              <div class="task-div">Crush Frameworks🖼️</div>
            </div>
          </div>

          <!-- DOING Column -->
          <div class="column-div" data-status="doing">
            <div class="column-head-div">
              <span class="dot"></span>
              <h4 class="columnHeader">DOING (0)</h4>
            </div>
            <!-- Tasks container for DOING -->
            <div class="tasks-container">
              <div class="task-div">Master JavaScript 💛</div>
              <div class="task-div">Never Give Up 🏆</div>
            </div>
          </div>

          <!-- DONE Column -->
          <div class="column-div" data-status="done">
            <div class="column-head-div">
              <span class="dot"></span>

              <!-- Tasks container for DONE -->
              <h4 class="columnHeader">DONE (0)</h4>
            </div>
            <div class="tasks-container">
              <div class="task-div">Explore ES6 Features 🚀</div>
              <div class="task-div">Have fun 🥳</div>
            </div>
          </div>
        </main>
      </div>
    </div>

    <!-- ✅ Add Task Modal -->
    <dialog class="modal-overlay">
      <form class="modal-window" id="new-task-modal-window">
        <div class="modal-header">
          <h3 class="modal-title">Add New Task</h3>
          <span class="close-btn" id="cancel-add-btn">&times;</span>
        </div>
        <div class="input-div">
          <label for="title-input">Title</label>
          <input type="text" id="title-input" required />
        </div>
        <div class="input-div">
          <label for="desc-input">Description</label>
          <textarea id="desc-input" required></textarea>
        </div>
        <div class="input-div">
          <label for="select-status">Status</label>
          <select id="select-status" required>
            <option value="todo">todo</option>
            <option value="doing">doing</option>
            <option value="done">done</option>
          </select>
        </div>
        <div class="button-group">
          <input type="submit" id="create-task-btn" value="Create Task" />
        </div>
      </form>
    </dialog>
  </body>
</html>
